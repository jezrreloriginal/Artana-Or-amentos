<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artana Orçamentos</title>
</head>
<body style="margin: 0; padding: 2rem; font-family: sans-serif; background-color: #f4f6f9; color: #333;">

    <header style="text-align: center; margin-bottom: 2rem;">
        <h1>Artana Orçamentos</h1>
    </header>

    <main style="max-width: 500px; margin: 0 auto; background: #ffffff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        
        <div style="margin-bottom: 1rem;">
            <label>Tipo de Produto</label>
            <select id="produto" style="width: 100%; padding: 0.5rem; margin-top: 0.5rem;">
                <option value="deck">Deck (m²)</option>
                <option value="rodape7">Rodapé 7cm (Metro Linear)</option>
                <option value="rodape10">Rodapé 10cm (Metro Linear)</option>
                <option value="ripado_linear">Ripado (Metro Linear)</option>
                <option value="ripado_m2">Ripado (Metro Quadrado)</option>
            </select>
        </div>

        <div style="margin-bottom: 1rem;">
            <label>Quantidade</label>
            <input type="number" id="medida" step="0.01" required style="width: 100%; padding: 0.5rem; margin-top: 0.5rem;">
        </div>

        <button type="button" onclick="calcular()" style="width: 100%; padding: 0.8rem; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 0.5rem;">Calcular Orçamento</button>
        
        <button type="button" onclick="aplicarDesconto()" style="width: 100%; padding: 0.8rem; background-color: #059669; color: white; border: none; border-radius: 4px; cursor: pointer;">Aplicar 10% de Desconto</button>
        
        <div id="resultado" style="margin-top: 2rem; padding: 1rem; background: #e2e8f0; border-radius: 4px; display: none;"></div>
    </main>

    <script>
        let valorTotalFinal = 0;

        function calcular() {
            let tipo = document.getElementById('produto').value;
            let qtd = parseFloat(document.getElementById('medida').value);
            if (!qtd) { alert("Digite a medida"); return; }

            let divRes = document.getElementById('resultado');
            divRes.style.display = 'block';

            if (tipo === 'deck') {
                let qtdDeck = Math.ceil(qtd * 2.70);
                let valDeck = qtdDeck * 150;
                let qtdBar = (qtd * 1.20);
                let valBar = qtdBar * 60;
                let qtdPres = (qtd * 2.50);
                let valPres = qtdPres * 2;
                let qtdPara = (qtd * 22);
                let valPara = qtdPara * 2;
                valorTotalFinal = valDeck + valBar + valPres + valPara;

                divRes.innerHTML = `<strong>Deck:</strong><br>Peças Deck: ${qtdDeck} (R$ ${valDeck.toFixed(2)})<br>Barrotes: ${qtdBar.toFixed(2)} (R$ ${valBar.toFixed(2)})<br>Presilhas: ${qtdPres.toFixed(2)} (R$ ${valPres.toFixed(2)})<br>Parafusos: ${qtdPara.toFixed(2)} (R$ ${valPara.toFixed(2)})<br><hr><strong>TOTAL: R$ ${valorTotalFinal.toFixed(2)}</strong>`;
            } 
            else if (tipo === 'ripado_linear') {
                let pecas = Math.ceil(qtd / 0.16); // 16cm = 0.16m
                valorTotalFinal = pecas * 50;
                divRes.innerHTML = `<strong>Ripado Linear:</strong><br>${pecas} peças<br><hr><strong>TOTAL: R$ ${valorTotalFinal.toFixed(2)}</strong>`;
            }
            else if (tipo === 'ripado_m2') {
                let pecas = Math.ceil(qtd / 0.46);
                valorTotalFinal = pecas * 50;
                divRes.innerHTML = `<strong>Ripado m²:</strong><br>${pecas} peças<br><hr><strong>TOTAL: R$ ${valorTotalFinal.toFixed(2)}</strong>`;
            }
            else {
                let precoUnit = (tipo === 'rodape7') ? 25 : 37;
                let qtdPecas = Math.ceil(qtd / 2.40);
                valorTotalFinal = qtdPecas * precoUnit;
                divRes.innerHTML = `<strong>Rodapé ${tipo === 'rodape7' ? '7cm' : '10cm'}:</strong><br>${qtdPecas} peças<br><hr><strong>TOTAL: R$ ${valorTotalFinal.toFixed(2)}</strong>`;
            }
        }

        function aplicarDesconto() {
            if (valorTotalFinal > 0) {
                valorTotalFinal = valorTotalFinal * 0.90;
                document.getElementById('resultado').innerHTML += `<br><strong style="color: red;">TOTAL COM DESCONTO: R$ ${valorTotalFinal.toFixed(2)}</strong>`;
            } else {
                alert("Calcule um orçamento primeiro!");
            }
        }
    </script>
</body>
</html>
